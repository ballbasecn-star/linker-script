spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:117.72.207.52}:${PGPORT:5432}/${PGDATABASE:postgres}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

linkscript:
  ai:
    enabled: ${LINKSCRIPT_AI_ENABLED:true}
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn/v1}
    chat-model: ${OPENAI_CHAT_MODEL:Pro/zai-org/GLM-4.7}
    embedding-model: ${OPENAI_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-8B}
    temperature: ${OPENAI_TEMPERATURE:0.7}
    connect-timeout-seconds: ${LINKSCRIPT_AI_CONNECT_TIMEOUT:10}
    read-timeout-seconds: ${LINKSCRIPT_AI_READ_TIMEOUT:90}
    max-retries: ${LINKSCRIPT_AI_MAX_RETRIES:2}
  logging:
    enabled: ${LINKSCRIPT_LOGGING_ENABLED:true}
    max-payload-length: ${LINKSCRIPT_LOGGING_MAX_PAYLOAD_LENGTH:1600}

logging:
  level:
    com.linkscript: INFO
