<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkScript Console</title>
    <!-- Use a modern font like Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="dashboard-header">
        <div class="nav-content">
            <div class="brand-area">
                <div class="brand-logo">L</div>
                <span class="brand-text">LinkScript</span>
            </div>
            <div class="status-area">
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span id="healthStatus">Ready</span>
                    <small id="healthHint" style="display:none;"></small>
                </div>
            </div>
        </div>
    </nav>

    <div class="hero-stats">
        <div class="hero-content">
            <h1>创意素材中台 Dashboard</h1>
            <p>导入爆款视频、拆解逻辑链路、检索核心片段，在这里开启极度结构化的创编体验。</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Ingestion</span>
                    <strong class="stat-value" id="ingestMetric">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Fragments</span>
                    <strong class="stat-value" id="fragmentMetric">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Search Hits</span>
                    <strong class="stat-value" id="searchMetric">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Generations</span>
                    <strong class="stat-value" id="generationMetric">0</strong>
                </div>
            </div>
        </div>
    </div>

    <main class="console-layout">
        <div class="layout-left">
            <!-- Panel: Ingest -->
            <section class="panel-card" id="ingest-panel">
                <div class="panel-header">
                    <div class="header-title">
                        <div class="panel-icon icon-blue"></div>
                        <h2>素材导入</h2>
                    </div>
                </div>
                <form id="ingestForm" class="form-stack">
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" name="title" placeholder="例如：别把项目讲成流水账" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>来源平台</label>
                            <input type="text" name="sourcePlatform" value="douyin" required>
                        </div>
                        <div class="form-group">
                            <label>外部 ID</label>
                            <input type="text" name="externalId" placeholder="唯一标识">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>正文素材</label>
                        <textarea name="content" rows="6" placeholder="贴入脚本原文，系统自动拆解逻辑并打分..." required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>点赞</label>
                            <input type="number" name="likes" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>分享</label>
                            <input type="number" name="shares" value="0" min="0">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">导入并触发分析</button>
                </form>
                <div class="panel-log" id="ingestLog">等待导入任务</div>
            </section>

            <!-- Panel: Library Search -->
            <section class="panel-card mt-card">
                <div class="panel-header">
                    <div class="header-title">
                        <div class="panel-icon icon-emerald"></div>
                        <h2>素材资源库</h2>
                    </div>
                </div>
                <form id="libraryForm" class="form-stack">
                    <div class="form-row">
                        <div class="form-group">
                            <label>标签筛选</label>
                            <input type="text" name="tags" placeholder="多标签用逗号分隔，如: 职场,创业">
                        </div>
                        <div class="form-group">
                            <label>热度筛选</label>
                            <input type="text" name="heatLevel" value="S,A">
                        </div>
                    </div>
                    <button type="submit" class="btn-secondary">筛选素材</button>
                </form>
                <div class="result-list" id="libraryResults">
                    <div class="empty-state">输入条件筛选素材库</div>
                </div>
            </section>
        </div>

        <div class="layout-right">
            <!-- Panel: Analysis Detail -->
            <section class="panel-card">
                <div class="panel-header">
                    <div class="header-title">
                        <div class="panel-icon icon-indigo"></div>
                        <h2>脚本结构与逻辑碎片</h2>
                    </div>
                    <span class="badge badge-normal" id="scriptStatusTag">No Script</span>
                </div>
                <div class="toolbar">
                    <input id="scriptUuidInput" type="text" placeholder="输入 scriptUuid 查询详情 (或点击左侧素材)">
                    <button id="loadScriptBtn" class="btn-secondary">加载脚本</button>
                </div>
                <article class="script-card" id="scriptMeta">
                    <div class="empty-state">
                        <h3>等待脚本</h3>
                        <p>导入或在左侧点击素材，这里会展示标题、状态、统计信息和碎片详情。</p>
                    </div>
                </article>
                <div class="fragment-list" id="fragmentList">
                    <div class="empty-state">暂无碎片结果</div>
                </div>
            </section>

            <div class="bottom-grid">
                <!-- Panel: Semantic Search -->
                <section class="panel-card">
                    <div class="panel-header">
                        <div class="header-title">
                            <div class="panel-icon icon-purple"></div>
                            <h2>爆款 Hook 检索</h2>
                        </div>
                    </div>
                    <form id="searchForm" class="form-stack">
                        <div class="form-group">
                            <label>检索主题</label>
                            <input type="text" name="topic" placeholder="例如：职场焦虑" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>类型</label>
                                <select name="type">
                                    <option value="HOOK">HOOK</option>
                                    <option value="SETUP">SETUP</option>
                                    <option value="VALUE">VALUE</option>
                                    <option value="CTA">CTA</option>
                                    <option value="">全部</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>条数</label>
                                <input type="number" name="limit" value="3" min="1" max="10">
                            </div>
                        </div>
                        <button type="submit" class="btn-secondary">执行检索</button>
                    </form>
                    <div class="result-list" id="searchResults">
                        <div class="empty-state">暂无检索结果</div>
                    </div>
                </section>
                
                <!-- Panel: Generate -->
                <section class="panel-card" id="generate-panel">
                    <div class="panel-header">
                        <div class="header-title">
                            <div class="panel-icon icon-amber"></div>
                            <h2>样本驱动创作台</h2>
                        </div>
                    </div>
                    <form id="generateForm" class="form-stack">
                        <div class="form-group">
                            <label>创作主题</label>
                            <input type="text" name="topic" placeholder="例如：向老板汇报 AI 项目价值" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>语气</label>
                                <input type="text" name="tone" value="专业、锋利">
                            </div>
                            <div class="form-group">
                                <label>长度</label>
                                <input type="number" name="length" value="280">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>样本 UUID</label>
                            <input type="text" name="sampleUuids" placeholder="多个用逗号分隔；留空则自动选样">
                        </div>
                        <button type="submit" class="btn-primary">生成脚本</button>
                    </form>
                    <article class="generation-output" id="generationOutput">
                        <div class="empty-state">
                            <h3>等待生成</h3>
                            <p>提交主题后，这里会显示最终脚本与引用样本。</p>
                        </div>
                    </article>
                </section>
            </div>
        </div>
    </main>

    <script src="/app.js"></script>
</body>
</html>
