spring:
  datasource:
    url: jdbc:h2:mem:linkscript-test;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-dev.sql

linkscript:
  ai:
    enabled: false
  vector:
    dimensions: 4096
    lexical-candidate-limit: 200
  logging:
    enabled: false
