# 5) www.ballbase.cloud: 80 跳 https
server {
  listen 80;
  server_name www.ballbase.cloud;
  return 301 https://$host$request_uri;
}

# 6) www.ballbase.cloud: 443 提供 https（使用单独证书）
server {
  listen 443 ssl;
  server_name www.ballbase.cloud;

  ssl_certificate     /etc/nginx/ssl/www.ballbase.cloud.pem;
  ssl_certificate_key /etc/nginx/ssl/www.ballbase.cloud.key;

  client_max_body_size 20m;

  location /api/v1/ {
    set $linker_backend http://backend:8080;
    proxy_pass $linker_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /test {
    alias /var/www/html/test.html;
    default_type text/html;
  }

  location / {
    set $linker_frontend http://frontend:3000;
    proxy_pass $linker_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

# 7) parser.ballbase.cloud: 80 跳 https
server {
  listen 80;
  server_name parser.ballbase.cloud;
  return 301 https://$host$request_uri;
}

# 8) parser.ballbase.cloud: 443 提供 https (合并了 douyin-parser 和 linker-script 的暴露)
server {
  listen 443 ssl;
  server_name parser.ballbase.cloud;

  ssl_certificate     /etc/nginx/ssl/parser.ballbase.cloud.pem;
  ssl_certificate_key /etc/nginx/ssl/parser.ballbase.cloud.key;

  client_max_body_size 20m;

  # --- linker-script endpoints ---
  # 优先匹配 /api 并且转发给 linker-script
  location /api/ {
    set $linker_script http://linker-script:8080;
    proxy_pass $linker_script;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- douyin-parser endpoints ---
  location /webhook {
    set $parser_webhook http://douyin-parser:5555;
    proxy_pass $parser_webhook;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    # 默认兜底：如果不是 api 或者 webhook，把静态文件请求转发给 douyin-parser 根目录或者也可以设为 linker-script，这里根据你的需要
    # 这里我们把网页直接打到 linker-script（因为它里面包含了新 UI）
    set $linker_script http://linker-script:8080;
    proxy_pass $linker_script;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
