map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

resolver 127.0.0.11 ipv6=off valid=30s;

# 1) IP: 80 直接提供服务（不跳转 https）
server {
  listen 80;
  server_name 117.72.207.52;

  client_max_body_size 20m;

  location /api/v1/ {
    set $linker_backend http://backend:8080;
    proxy_pass $linker_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    set $linker_frontend http://frontend:3000;
    proxy_pass $linker_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

# 2) linker 域名: 80 跳 https
server {
  listen 80;
  server_name linker.ballbase.cloud;
  return 301 https://$host$request_uri;
}

# 3) linker 域名: 443 提供 https
server {
  listen 443 ssl;
  server_name linker.ballbase.cloud;

  ssl_certificate     /etc/nginx/ssl/linker.ballbase.cloud.pem;
  ssl_certificate_key /etc/nginx/ssl/linker.ballbase.cloud.key;

  client_max_body_size 20m;

  location /api/v1/ {
    set $linker_backend http://backend:8080;
    proxy_pass $linker_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    set $linker_frontend http://frontend:3000;
    proxy_pass $linker_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

