services:
  linker-script:
    image: ${IMAGE_REPOSITORY:-linkscript}:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: linker-script
    restart: unless-stopped
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      OPENAI_CHAT_MODEL: ${OPENAI_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      LINKSCRIPT_VECTOR_DIMENSIONS: ${LINKSCRIPT_VECTOR_DIMENSIONS:-4096}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      LINKSCRIPT_AI_READ_TIMEOUT: "180"
    # Port is not exported directly, relies on shared-proxy for Nginx routing
    networks:
      - shared-proxy

networks:
  shared-proxy:
    external: true
