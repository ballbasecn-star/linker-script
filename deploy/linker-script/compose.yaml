services:
  linker-script:
    image: linkscript:latest-amd64
    container_name: linker-script
    restart: unless-stopped
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
      DB_USERNAME: ${DB_USER}
      OPENAI_CHAT_MODEL: ${OPENAI_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      LINKSCRIPT_AI_READ_TIMEOUT: "180"
    # Port is not exported directly, relies on shared-proxy for Nginx routing
    networks:
      - shared-proxy

networks:
  shared-proxy:
    external: true
